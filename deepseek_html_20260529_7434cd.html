<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>AnimeTee | Black White Red + Top Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000000; color: #ffffff; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }
        body { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><polygon points="2,2 22,13 12,16 2,25" fill="%23ff0000" stroke="%23fff" stroke-width="1.5"/><circle cx="12" cy="13" r="3" fill="%23fff"/></svg>') 12 8, auto; }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #0a0a0a;
            backdrop-filter: blur(12px);
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1100;
            border-bottom: 1px solid #ff0000;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ff0000); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-link { color: #ddd; text-decoration: none; font-weight: 500; transition: 0.2s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: #ff0000; text-shadow: 0 0 2px #ff0000; }
        .icon-btn { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; position: relative; transition: 0.2s; }
        .icon-btn:hover { color: #ff0000; transform: scale(1.05); }
        .cart-count { position: absolute; top: -8px; right: -12px; background: #ff0000; color: #000; font-weight: bold; border-radius: 30px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        .search-bar { background: #1a1a1a; border-radius: 40px; padding: 0.4rem 1rem; border: 1px solid #ff0000; display: flex; gap: 8px; }
        .search-bar input { background: transparent; border: none; outline: none; color: white; width: 160px; }
        .search-bar i { color: #ff0000; }
        
        /* Main container (no side ads) */
        .main-container {
            margin-top: 90px;
            padding: 1.5rem 5% 80px 5%;
        }
        
        /* Large Top Rotating Banner (Hero) */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .banner-slides {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .banner-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            background-blend-mode: overlay;
            background-color: rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .banner-slide.active {
            opacity: 1;
            z-index: 1;
        }
        .banner-title {
            font-size: 3rem;
            font-weight: 800;
            text-shadow: 2px 2px 8px black;
            background: linear-gradient(135deg, #fff, #ff0000);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .banner-desc {
            font-size: 1.4rem;
            color: #fff;
            text-shadow: 1px 1px 4px black;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
        }
        .banner-btn {
            margin-top: 1.5rem;
            background: #ff0000;
            border: none;
            color: #000;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .banner-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.02);
        }
        /* Banner navigation dots */
        .banner-dots {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 5;
        }
        .banner-dot {
            width: 12px;
            height: 12px;
            background: #aaa;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .banner-dot.active {
            background: #ff0000;
            width: 30px;
            border-radius: 10px;
        }
        
        /* Anime & Product Grids */
        .anime-grid, .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .anime-card, .product-card {
            background: #111;
            border-radius: 24px;
            overflow: hidden;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #333;
        }
        .anime-card:hover, .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(255,0,0,0.3);
            border-color: #ff0000;
        }
        .anime-card img, .product-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .anime-card .info, .product-info {
            padding: 1rem;
            text-align: center;
        }
        .anime-card .info h3, .product-title {
            font-weight: 600;
            color: #fff;
        }
        .product-price { color: #ff0000; font-weight: bold; margin-top: 4px; }
        .product-actions {
            display: flex;
            justify-content: space-between;
            padding: 0 1rem 1rem 1rem;
            gap: 8px;
        }
        .action-icon {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .action-icon:hover { background: #ff0000; color: #000; }
        
        /* Fullscreen Modal */
        .fs-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .fs-modal img { max-width: 90%; max-height: 85%; border-radius: 24px; box-shadow: 0 0 30px #ff0000; }
        .fs-close { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: white; cursor: pointer; background: none; border: none; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1800; justify-content: center; align-items: center; }
        .modal-content { background: #111; max-width: 450px; width: 90%; border-radius: 32px; padding: 2rem; border-top: 4px solid #ff0000; text-align: center; }
        .modal-header { font-size: 1.6rem; margin-bottom: 1rem; color: #ff0000; }
        .size-selector { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
        .size-opt { background: #222; padding: 8px 18px; border-radius: 40px; cursor: pointer; color: white; }
        .size-opt:hover, .size-opt.selected { background: #ff0000; color: #000; }
        .modal-btn { background: #ff0000; border: none; color: #000; padding: 10px 24px; border-radius: 40px; font-weight: bold; margin-top: 12px; cursor: pointer; }
        
        /* Checkout Form */
        .checkout-form { background: #111; border-radius: 28px; padding: 1.8rem; text-align: left; }
        .checkout-form input, .checkout-form textarea, .checkout-form select { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #ff0000; border-radius: 16px; color: white; outline: none; }
        .checkout-form label { font-weight: 500; display: block; margin-top: 10px; color: #ddd; }
        
        /* Cart Sidebar */
        .cart-sidebar { position: fixed; top: 0; right: -420px; width: 380px; height: 100%; background: #0a0a0a; z-index: 1500; transition: right 0.3s; padding: 1.5rem; overflow-y: auto; border-left: 2px solid #ff0000; }
        .cart-sidebar.open { right: 0; }
        .cart-item { display: flex; gap: 12px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #333; }
        .cart-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; }
        .cart-remove { background: none; border: none; color: #aaa; cursor: pointer; }
        .cart-remove:hover { color: #ff0000; }
        
        /* Toast */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff0000; color: #000; padding: 12px 28px; border-radius: 50px; z-index: 3000; animation: fadeUp 0.3s; font-weight: bold; }
        @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        /* Hamburger Menu */
        .sidebar-menu { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #0a0a0a; backdrop-filter: blur(20px); z-index: 2100; transition: left 0.3s; padding: 2rem 1.5rem; border-right: 2px solid #ff0000; }
        .sidebar-menu.open { left: 0; }
        .sidebar-menu .close-btn { background: none; border: none; color: white; font-size: 1.8rem; float: right; cursor: pointer; }
        .sidebar-menu ul { list-style: none; margin-top: 3rem; }
        .sidebar-menu li { margin: 1.5rem 0; font-size: 1.2rem; cursor: pointer; display: flex; gap: 12px; align-items: center; color: #fff; }
        .sidebar-menu li i { width: 28px; color: #ff0000; }
        .sidebar-menu li:hover { color: #ff0000; transform: translateX(6px); }
        
        .back-button { background: #1a1a1a; border: 1px solid #ff0000; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; margin-bottom: 1.5rem; display: inline-block; }
        .back-button:hover { background: #ff0000; color: #000; }
        
        @media (max-width: 700px) {
            .header { flex-direction: column; }
            .main-container { margin-top: 130px; }
            .hero-banner { height: 300px; }
            .banner-title { font-size: 1.8rem; }
            .banner-desc { font-size: 1rem; }
            .anime-grid, .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">⚡ ANIMETEE</div>
    <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search anime or product..."></div>
    <div class="nav-links">
        <a class="nav-link active" data-page="home">Home</a>
        <a class="nav-link" data-page="shop">Shop</a>
        <button class="icon-btn" id="wishlistBtn"><i class="far fa-heart"></i></button>
        <button class="icon-btn" id="cartIconBtn"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-count">0</span></button>
    </div>
</header>

<!-- Hamburger Side Menu -->
<div id="hamburgerSidebar" class="sidebar-menu">
    <button class="close-btn" id="closeHamburger">&times;</button>
    <ul>
        <li data-section="categories"><i class="fas fa-tags"></i> Categories</li>
        <li data-section="customize"><i class="fas fa-palette"></i> Customize</li>
        <li data-section="trackorder"><i class="fas fa-truck"></i> Track Order</li>
        <li data-section="contact"><i class="fas fa-headset"></i> Contact</li>
        <li data-section="about"><i class="fas fa-info-circle"></i> About</li>
        <li data-section="faq"><i class="fas fa-question-circle"></i> FAQ</li>
    </ul>
</div>
<button id="hamburgerOpenBtn" style="position:fixed; top:100px; left:15px; z-index:1100; background:#ff0000; border:none; width:44px; height:44px; border-radius:50%; color:#000; font-size:1.3rem; cursor:pointer;"><i class="fas fa-bars"></i></button>

<div class="main-container" id="mainContainer"></div>

<!-- Fullscreen Modal -->
<div id="fullscreenModal" class="fs-modal"><button class="fs-close" id="fsCloseBtn">&times;</button><img id="fsImage" src=""></div>
<!-- Custom Modal -->
<div id="customModal" class="modal"><div class="modal-content"><div class="modal-header" id="modalTitle"></div><div id="modalBody"></div><button class="modal-btn" id="modalConfirmBtn">OK</button></div></div>
<!-- Cart Sidebar -->
<div id="cartSidebar" class="cart-sidebar"><h3 style="color:#fff;">🛒 Your Cart</h3><div id="cartItemsList"></div><div style="margin-top:20px;"><strong>Total: $<span id="cartTotalPrice">0.00</span></strong></div><button id="checkoutCartBtn" style="background:#ff0000; width:100%; margin-top:20px; padding:10px; border:none; border-radius:40px; font-weight:bold; color:#000; cursor:pointer;">Proceed to Checkout</button></div>

<script>
    // ---------- 20 ANIME (each with 1-3 products) ----------
    const animeNames = [
        "Naruto", "Jujutsu Kaisen", "Solo Leveling", "Demon Slayer", "Attack on Titan",
        "One Piece", "Bleach", "Dragon Ball Z", "My Hero Academia", "Tokyo Revengers",
        "Chainsaw Man", "Death Note", "Fullmetal Alchemist", "Hunter x Hunter", "Black Clover",
        "Fairy Tail", "Cowboy Bebop", "Neon Genesis Evangelion", "One Punch Man", "Vinland Saga"
    ];
    
    let products = [];
    let idCounter = 1;
    animeNames.forEach(anime => {
        let count = Math.floor(Math.random() * 3) + 1; // 1-3 products
        for (let i = 1; i <= count; i++) {
            products.push({
                id: idCounter++,
                name: `${anime} - Tee ${i}`,
                anime: anime,
                price: (Math.floor(Math.random() * 30) + 25).toFixed(2),
                image: `https://placehold.co/500x600/111/ff0000?text=${encodeURIComponent(anime.substring(0,10))}+${i}`
            });
        }
    });
    
    const animeCoverImages = {};
    animeNames.forEach(anime => {
        animeCoverImages[anime] = `https://placehold.co/500x600/111/ff0000?text=${encodeURIComponent(anime)}`;
    });
    
    // ---------- LARGE TOP BANNER (Auto-rotating offers) ----------
    const bannerSlides = [
        { title: "🔥 LIMITED EDITION", desc: "Naruto x Sasuke Bundle - 30% OFF", btn: "Shop Now", bg: "linear-gradient(135deg, #000, #3a0000), url('https://placehold.co/1600x600/111/ff0000?text=Naruto+Bundle')" },
        { title: "⚡ NEW COLLECTION", desc: "Jujutsu Kaisen Neon Drops", btn: "Explore", bg: "linear-gradient(135deg, #1a0000, #000), url('https://placehold.co/1600x600/111/ff0000?text=JJK+Neon')" },
        { title: "💀 DEMON SLAYER", desc: "Limited Hashira Tees", btn: "View", bg: "linear-gradient(135deg, #2a0000, #000), url('https://placehold.co/1600x600/111/ff0000?text=Demon+Slayer')" },
        { title: "🎁 FREE SHIPPING", desc: "On orders over $50", btn: "Grab Offer", bg: "linear-gradient(135deg, #000, #4a0000), url('https://placehold.co/1600x600/111/ff0000?text=Free+Shipping')" },
        { title: "✨ SOLO LEVELING", desc: "Shadow Monarch Edition", btn: "Shop Now", bg: "linear-gradient(135deg, #1a0a0a, #000), url('https://placehold.co/1600x600/111/ff0000?text=Solo+Leveling')" }
    ];
    
    let currentBanner = 0;
    let bannerInterval;
    
    function initTopBanner() {
        const container = document.getElementById("topBannerContainer");
        if (!container) return;
        container.innerHTML = `
            <div class="banner-slides" id="bannerSlides">
                ${bannerSlides.map((slide, idx) => `
                    <div class="banner-slide" data-index="${idx}" style="background-image: ${slide.bg}; background-size: cover;">
                        <div class="banner-title">${slide.title}</div>
                        <div class="banner-desc">${slide.desc}</div>
                        <button class="banner-btn" data-offer="${slide.title}">${slide.btn}</button>
                    </div>
                `).join('')}
            </div>
            <div class="banner-dots" id="bannerDots">
                ${bannerSlides.map((_, idx) => `<div class="banner-dot" data-dot="${idx}"></div>`).join('')}
            </div>
        `;
        // Show first slide
        const slides = document.querySelectorAll('.banner-slide');
        const dots = document.querySelectorAll('.banner-dot');
        if (slides.length) slides[0].classList.add('active');
        if (dots.length) dots[0].classList.add('active');
        
        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            currentBanner = index;
        }
        
        // Auto rotate
        function startRotation() {
            if (bannerInterval) clearInterval(bannerInterval);
            bannerInterval = setInterval(() => {
                let next = (currentBanner + 1) % bannerSlides.length;
                showSlide(next);
            }, 5000);
        }
        
        // Manual dot click
        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                let idx = parseInt(dot.getAttribute('data-dot'));
                showSlide(idx);
                startRotation();
            });
        });
        
        // Banner button click (demo)
        document.querySelectorAll('.banner-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                showToast(`🔥 ${btn.getAttribute('data-offer')} - Demo offer!`);
            });
        });
        
        startRotation();
    }
    
    // ---------- Cart & Helpers ----------
    let cart = [], wishlistIds = [];
    let currentAnimeFilter = null; // null = anime grid, string = showing anime products page
    let searchQuery = "";
    let pendingProduct = null;
    
    function showToast(msg) { let t=document.createElement("div"); t.className="toast"; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
    function showModal(title, body, onConfirm=null) {
        let modal=document.getElementById("customModal");
        document.getElementById("modalTitle").innerText=title;
        document.getElementById("modalBody").innerHTML=body;
        modal.style.display="flex";
        let btn=document.getElementById("modalConfirmBtn");
        let close=()=>{ modal.style.display="none"; if(onConfirm) onConfirm(); };
        btn.onclick=close;
    }
    function openSizeSelector(product) {
        pendingProduct=product;
        showModal("Select Size", `<div class="size-selector" id="sizeSelector">${['S','M','L','XL'].map(s=>`<div class="size-opt" data-size="${s}">${s}</div>`).join('')}</div>`);
        setTimeout(()=>{
            document.querySelectorAll('.size-opt').forEach(opt=>{
                opt.addEventListener('click',()=>{
                    let size=opt.getAttribute('data-size');
                    addToCart(pendingProduct, size);
                    document.getElementById("customModal").style.display="none";
                });
            });
        },50);
    }
    function addToCart(product, size) {
        let existing=cart.find(i=>i.id===product.id && i.size===size);
        if(existing) existing.quantity++;
        else cart.push({...product, quantity:1, size:size});
        updateCartUI();
        showToast(`${product.name} (${size}) added!`);
        saveData();
    }
    function removeFromCart(index) { cart.splice(index,1); updateCartUI(); showToast("Removed"); saveData(); }
    function updateCartUI() {
        let totalItems=cart.reduce((s,i)=>s+i.quantity,0);
        document.getElementById("cartCount").innerText=totalItems;
        let totalPrice=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
        document.getElementById("cartTotalPrice").innerText=totalPrice.toFixed(2);
        renderCartSidebar();
        saveData();
    }
    function toggleWishlist(id) {
        if(wishlistIds.includes(id)) { wishlistIds=wishlistIds.filter(i=>i!==id); showToast("Removed from wishlist"); }
        else { wishlistIds.push(id); showToast("Added to wishlist ❤️"); }
        saveData(); renderCurrentView();
    }
    function isWishlisted(id) { return wishlistIds.includes(id); }
    function saveData() { localStorage.setItem("animeCart",JSON.stringify(cart)); localStorage.setItem("animeWishlist",JSON.stringify(wishlistIds)); }
    function loadData() { let c=localStorage.getItem("animeCart"); if(c) cart=JSON.parse(c); let w=localStorage.getItem("animeWishlist"); if(w) wishlistIds=JSON.parse(w); updateCartUI(); }
    
    function renderProductsGrid(animeName = null) {
        let filtered = products;
        if (animeName) filtered = filtered.filter(p => p.anime === animeName);
        if (searchQuery && !animeName) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery) || p.anime.toLowerCase().includes(searchQuery));
        const grid = document.getElementById("productGrid");
        if (!grid) return;
        if (filtered.length === 0) { grid.innerHTML = "<div style='text-align:center; padding:2rem;'>No products found</div>"; return; }
        grid.innerHTML = filtered.map(p => `
            <div class="product-card">
                <img class="product-img" src="${p.image}" data-full="${p.image}" alt="${p.name}">
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">$${p.price}</div>
                    <div style="font-size:0.7rem; color:#ff4444;">${p.anime}</div>
                </div>
                <div class="product-actions">
                    <button class="action-icon add-cart" data-id="${p.id}"><i class="fas fa-cart-plus"></i></button>
                    <button class="action-icon wishlist-act" data-id="${p.id}"><i class="fas ${isWishlisted(p.id)?'fa-heart':'fa-heart-o'}"></i></button>
                    <button class="action-icon fullview" data-img="${p.image}"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.add-cart').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let id=parseInt(btn.getAttribute('data-id')); let prod=products.find(p=>p.id===id); if(prod) openSizeSelector(prod); }));
        document.querySelectorAll('.wishlist-act').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let id=parseInt(btn.getAttribute('data-id')); toggleWishlist(id); }));
        document.querySelectorAll('.fullview').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let src=btn.getAttribute('data-img'); openFullscreen(src); }));
        document.querySelectorAll('.product-img').forEach(img=>img.addEventListener('click',()=>openFullscreen(img.getAttribute('data-full'))));
    }
    
    function openFullscreen(src){ let modal=document.getElementById("fullscreenModal"); document.getElementById("fsImage").src=src; modal.style.display="flex"; document.getElementById("fsCloseBtn").onclick=()=>modal.style.display="none"; modal.onclick=(e)=>{ if(e.target===modal) modal.style.display="none"; }; }
    
    function renderAnimeGrid() {
        const container = document.getElementById("animeGrid");
        if (!container) return;
        container.innerHTML = animeNames.map(anime => `
            <div class="anime-card" data-anime="${anime}">
                <img src="${animeCoverImages[anime]}" alt="${anime}">
                <div class="info"><h3>${anime}</h3></div>
            </div>
        `).join('');
        document.querySelectorAll('.anime-card').forEach(card => {
            card.addEventListener('click', () => {
                let anime = card.getAttribute('data-anime');
                showAnimePage(anime);
            });
        });
    }
    
    function showAnimePage(animeName) {
        currentAnimeFilter = animeName;
        const container = document.getElementById("mainContainer");
        container.innerHTML = `
            <div class="hero-banner" id="topBannerContainer"></div>
            <button class="back-button" id="backToHomeBtn"><i class="fas fa-arrow-left"></i> Back to All Anime</button>
            <h2 style="margin-bottom: 1rem;">${animeName} T‑Shirts</h2>
            <div id="productGrid" class="product-grid"></div>
        `;
        initTopBanner(); // re-init banner on this page
        renderProductsGrid(animeName);
        document.getElementById("backToHomeBtn").addEventListener('click', () => {
            currentAnimeFilter = null;
            renderHome();
        });
        let inp = document.getElementById("searchInput");
        if (inp) {
            inp.oninput = (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderProductsGrid(animeName);
            };
        }
    }
    
    function renderHome() {
        currentAnimeFilter = null;
        const container = document.getElementById("mainContainer");
        container.innerHTML = `
            <div class="hero-banner" id="topBannerContainer"></div>
            <h2 style="margin-bottom: 1rem;">Browse by Anime</h2>
            <div id="animeGrid" class="anime-grid"></div>
        `;
        initTopBanner();
        renderAnimeGrid();
        let inp = document.getElementById("searchInput");
        if (inp) {
            inp.oninput = (e) => {
                let query = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.anime-card');
                cards.forEach(card => {
                    let animeName = card.getAttribute('data-anime');
                    if (animeName.toLowerCase().includes(query)) card.style.display = "";
                    else card.style.display = "none";
                });
            };
        }
    }
    
    function renderShop() {
        currentAnimeFilter = null;
        const container = document.getElementById("mainContainer");
        container.innerHTML = `
            <div class="hero-banner" id="topBannerContainer"></div>
            <h2 style="margin-bottom: 1rem;">All T‑Shirts</h2>
            <div id="productGrid" class="product-grid"></div>
        `;
        initTopBanner();
        renderProductsGrid(null);
        let inp = document.getElementById("searchInput");
        if (inp) {
            inp.oninput = (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderProductsGrid(null);
            };
        }
    }
    
    function renderCartSidebar() {
        let container=document.getElementById("cartItemsList");
        if(!container) return;
        if(cart.length===0){ container.innerHTML="<p>Cart empty</p>"; return; }
        container.innerHTML=cart.map((item,idx)=>`
            <div class="cart-item">
                <img class="cart-item-img" src="${item.image}">
                <div style="flex:1">
                    <div>${item.name}</div>
                    <div>Size: ${item.size} | Qty: ${item.quantity}</div>
                    <div>$${(item.price*item.quantity).toFixed(2)}</div>
                </div>
                <button class="cart-remove" data-idx="${idx}"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
        document.querySelectorAll('.cart-remove').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx=parseInt(btn.getAttribute('data-idx')); removeFromCart(idx); }));
    }
    
    // Checkout with PDF
    function showCheckoutForm() {
        if(cart.length===0){ showToast("Cart is empty"); return; }
        let total=cart.reduce((s,i)=>s+(i.price*i.quantity),0).toFixed(2);
        let html=`
            <div class="checkout-form">
                <h3 style="color:#fff;">📦 Delivery Details</h3>
                <label>Full Name *</label><input type="text" id="fullName" placeholder="John Doe">
                <label>Phone Number *</label><input type="tel" id="phone" placeholder="+8801xxxxxxxxx">
                <label>Email Address *</label><input type="email" id="email" placeholder="example@mail.com">
                <label>Delivery Address (Home) *</label><textarea id="address" rows="2" placeholder="House, Road, City, Zip"></textarea>
                <label>Payment Method</label>
                <select id="paymentMethod"><option>Cash on Delivery</option><option>Credit Card</option><option>bKash</option></select>
                <label>Additional Notes</label><textarea id="orderNotes" rows="2"></textarea>
                <p style="margin-top:12px;"><strong style="color:#ff0000;">Total: $${total}</strong></p>
                <button id="confirmOrderBtn" style="background:#ff0000; border:none; padding:12px; width:100%; border-radius:40px; font-weight:bold; margin-top:12px; cursor:pointer; color:#000;">✅ PLACE ORDER</button>
                <button id="cancelOrderBtn" style="background:#333; margin-top:8px; cursor:pointer; color:#fff;">Cancel</button>
            </div>
        `;
        showModal("Complete Your Order", html, null);
        setTimeout(()=>{
            let confirmBtn=document.getElementById("confirmOrderBtn");
            let cancelBtn=document.getElementById("cancelOrderBtn");
            if(confirmBtn){
                confirmBtn.onclick=()=>{
                    let name=document.getElementById("fullName")?.value.trim();
                    let phone=document.getElementById("phone")?.value.trim();
                    let email=document.getElementById("email")?.value.trim();
                    let address=document.getElementById("address")?.value.trim();
                    let payment=document.getElementById("paymentMethod")?.value;
                    let notes=document.getElementById("orderNotes")?.value;
                    if(!name || !phone || !email || !address){ showToast("Please fill all required fields (*)"); return; }
                    let orderId="ORD"+Math.floor(Math.random()*1000000);
                    let itemsHtml=cart.map(i=>`${i.name} (${i.size}) x${i.quantity} = $${(i.price*i.quantity).toFixed(2)}`).join("<br>");
                    let receiptHtml=`
                        <div id="pdfReceipt" style="font-family: 'Inter', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: white; color: black;">
                            <div style="text-align: center; border-bottom: 2px solid #ff0000;"><h1 style="color:#ff0000;">ANIMETEE</h1><p>Premium Anime Streetwear</p></div>
                            <div style="display:flex; justify-content:space-between; margin:15px 0;"><div><strong>Order ID:</strong> ${orderId}</div><div><strong>Date:</strong> ${new Date().toLocaleString()}</div></div>
                            <div style="background:#f4f4f4; padding:12px; border-radius:12px;"><h3>Customer Details</h3><p><strong>Name:</strong> ${name}<br><strong>Phone:</strong> ${phone}<br><strong>Email:</strong> ${email}<br><strong>Address:</strong> ${address}</p></div>
                            <div style="margin:15px 0;"><h3>Items</h3><div style="border:1px solid #ddd; padding:10px;">${itemsHtml}</div></div>
                            <div style="text-align:right; border-top:1px solid #ddd; padding-top:10px;"><h3>Total: <span style="color:#ff0000;">$${total}</span></h3><p>Payment: ${payment}</p><p>Home delivery (3-5 days)</p>${notes?`<p>Notes: ${notes}</p>`:''}</div>
                            <div style="text-align:center; margin-top:20px;">Thank you for shopping at AnimeTee!</div>
                        </div>
                    `;
                    cart=[];
                    updateCartUI();
                    saveData();
                    document.getElementById("customModal").style.display="none";
                    showModal("Order Placed 🎉", `<div id="receiptContent">${receiptHtml}</div><button id="downloadPdfBtn" class="modal-btn" style="margin-top:15px;">Download PDF Receipt</button>`, null);
                    setTimeout(()=>{
                        let pdfBtn=document.getElementById("downloadPdfBtn");
                        if(pdfBtn) pdfBtn.onclick=()=>{ let element=document.getElementById("receiptContent"); html2pdf().from(element).set({ margin:0.5, filename:`AnimeTee_Order_${orderId}.pdf`, html2canvas:{scale:2, background:true}, jsPDF:{unit:'in', format:'a4', orientation:'portrait'} }).save(); };
                    },100);
                };
            }
            if(cancelBtn) cancelBtn.onclick=()=>document.getElementById("customModal").style.display="none";
        },50);
    }
    
    function renderCurrentView() {
        if (window.currentPage === "home") renderHome();
        else if (window.currentPage === "shop") renderShop();
        else if (currentAnimeFilter && typeof currentAnimeFilter === 'string') showAnimePage(currentAnimeFilter);
    }
    
    // Sidebar pages (simplified)
    function showSidebarPage(page){
        let content="";
        if(page==="categories") content=`<h2>Anime Categories</h2><div class="anime-grid">${animeNames.map(a=>`<div class="anime-card"><img src="${animeCoverImages[a]}"><div class="info"><h3>${a}</h3></div></div>`).join('')}</div>`;
        else if(page==="customize") content=`<h2>Customize</h2><input type="file" id="customUpload"><button id="previewCustom" class="modal-btn">Preview</button><div id="customPreview"></div><script>document.getElementById('customUpload')?.addEventListener('change',(e)=>{ if(e.target.files[0]) showToast("Demo: design uploaded"); });<\/script>`;
        else if(page==="trackorder") content=`<h2>Track Order</h2><input id="trackId" placeholder="Order ID"><button id="trackBtn" class="modal-btn">Track</button><p id="trackRes"></p><script>document.getElementById('trackBtn')?.addEventListener('click',()=>document.getElementById('trackRes').innerHTML="Demo: Order shipped (3-5 days)");<\/script>`;
        else if(page==="contact") content=`<h2>Contact</h2><input placeholder="Email"><textarea placeholder="Message"></textarea><button class="modal-btn">Send</button><p>Demo contact form</p>`;
        else if(page==="about") content=`<h2>About AnimeTee</h2><p>Premium anime streetwear. Black, white, red aesthetic. Worldwide shipping.</p>`;
        else if(page==="faq") content=`<h2>FAQ</h2><p><strong>Shipping?</strong> 5-7 days<br><strong>Returns?</strong> 30 days</p>`;
        document.getElementById("mainContainer").innerHTML=`<div style="background:#0a0a0a; border-radius:32px; padding:2rem;">${content}</div>`;
        if(page==="customize") { let up=document.getElementById("customUpload"); if(up) up.onchange=()=>showToast("Demo: design uploaded"); }
        if(page==="trackorder") { let btn=document.getElementById("trackBtn"); if(btn) btn.onclick=()=>document.getElementById("trackRes").innerHTML="Demo: Your order is on the way!"; }
    }
    
    // Navigation
    document.querySelectorAll('.nav-link').forEach(link=>{
        link.addEventListener('click',()=>{
            let page=link.getAttribute('data-page');
            if(page==='home') { window.currentPage = "home"; renderHome(); }
            else if(page==='shop') { window.currentPage = "shop"; renderShop(); }
            document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
            link.classList.add('active');
        });
    });
    document.getElementById("cartIconBtn").addEventListener('click',()=>document.getElementById("cartSidebar").classList.toggle("open"));
    document.getElementById("checkoutCartBtn").addEventListener('click',()=>showCheckoutForm());
    document.getElementById("wishlistBtn").addEventListener('click',()=>{ if(wishlistIds.length) showModal("Wishlist", wishlistIds.map(id=>products.find(p=>p.id===id)?.name).join("<br>"), null); else showToast("Wishlist empty"); });
    
    // Hamburger
    let hamburger=document.getElementById("hamburgerSidebar");
    document.getElementById("hamburgerOpenBtn").addEventListener('click',()=>hamburger.classList.add("open"));
    document.getElementById("closeHamburger").addEventListener('click',()=>hamburger.classList.remove("open"));
    document.querySelectorAll("#hamburgerSidebar li").forEach(li=>li.addEventListener('click',()=>{ let section=li.getAttribute('data-section'); showSidebarPage(section); hamburger.classList.remove("open"); }));
    document.addEventListener('click',(e)=>{ let sidebar=document.getElementById("cartSidebar"); if(!sidebar.contains(e.target) && !document.getElementById("cartIconBtn").contains(e.target)) sidebar.classList.remove("open"); });
    
    loadData();
    window.currentPage = "home";
    renderHome();
</script>
</body>
</html>
