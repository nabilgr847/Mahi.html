<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Zchoice | Anime Streetwear + Fabric Pricing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }

        .header { position: fixed; top: 0; left: 0; width: 100%; background: #0a0a0a; backdrop-filter: blur(12px); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1100; border-bottom: 1px solid #ff0000; }
        .hamburger-icon { background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; }
        .logo-centered { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ff0000); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .right-icons { display: flex; gap: 1rem; align-items: center; }
        .icon-btn { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; }
        .icon-btn:hover { color: #ff0000; }
        .cart-count { position: absolute; top: -8px; right: -12px; background: #ff0000; color: #000; font-weight: bold; border-radius: 30px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        .cart-icon-wrapper { position: relative; }
        .search-overlay { position: fixed; top: 80px; left: 0; width: 100%; background: #0a0a0a; border-bottom: 1px solid #ff0000; padding: 0.8rem 5%; z-index: 1099; display: none; backdrop-filter: blur(12px); }
        .search-overlay input { width: 100%; padding: 12px 20px; background: #1a1a1a; border: 1px solid #ff0000; border-radius: 40px; color: white; font-size: 1rem; outline: none; }
        .main-container { margin-top: 90px; padding: 1.5rem 5% 80px 5%; }
        .ad-banner { width: 100%; height: 320px; background: #0a0a0a; border: 1px solid #ff0000; border-radius: 32px; overflow: hidden; position: relative; margin-bottom: 2rem; }
        .ad-banner-container { width: 100%; height: 100%; position: relative; }
        .ad-banner-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 0.6s ease; }
        .ad-banner-slide.active { opacity: 1; position: relative; }
        .section-header { display: flex; justify-content: space-between; align-items: baseline; margin: 2rem 0 1rem 0; }
        .section-header h2 { font-size: 1.5rem; font-weight: 600; }
        .view-all { color: #ff0000; font-weight: 500; cursor: pointer; font-size: 0.9rem; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; margin: 1rem 0 1.5rem 0; justify-content: center; }
        .filter-btn { background: #1a1a1a; border: 1px solid #ff0000; color: white; padding: 6px 18px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .filter-btn:hover, .filter-btn.active { background: #ff0000; color: #000; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .product-card { background: #111; border-radius: 20px; overflow: hidden; transition: 0.2s; border: 1px solid #333; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); border-color: #ff0000; box-shadow: 0 8px 20px rgba(255,0,0,0.2); }
        .product-img { width: 100%; height: 220px; object-fit: cover; }
        .product-info { padding: 0.8rem; text-align: center; }
        .product-title { font-weight: 600; font-size: 0.9rem; }
        .product-price { color: #ff0000; font-weight: bold; margin-top: 5px; font-size: 1rem; }
        .product-actions { display: flex; justify-content: center; gap: 12px; padding: 0 0.8rem 0.8rem 0.8rem; }
        .action-icon { background: rgba(255,255,255,0.1); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .action-icon:hover { background: #ff0000; color: #000; }
        /* Product Detail Page */
        .product-detail-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; overflow-y: auto; padding: 90px 5% 100px; display: none; }
        .detail-card { max-width: 1200px; margin: 0 auto; background: #0a0a0a; border-radius: 32px; border: 1px solid #ff0000; overflow: hidden; }
        .detail-flex { display: flex; flex-wrap: wrap; }
        .detail-img-col { flex: 1; min-width: 280px; background: #111; padding: 2rem; text-align: center; }
        .main-gallery-img { max-width: 100%; max-height: 350px; object-fit: contain; border-radius: 20px; margin-bottom: 1rem; }
        .thumbnail-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .thumbnail { width: 70px; height: 70px; object-fit: cover; border-radius: 12px; border: 2px solid #333; cursor: pointer; transition: 0.2s; }
        .thumbnail:hover, .thumbnail.active { border-color: #ff0000; transform: scale(1.05); }
        .detail-info-col { flex: 1.5; padding: 2rem; }
        .detail-name { font-size: 1.8rem; font-weight: 700; }
        .detail-price { font-size: 1.6rem; color: #ff0000; font-weight: bold; margin: 0.5rem 0; }
        .size-group, .fabric-group { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .size-btn, .fabric-btn { background: #222; padding: 8px 20px; border-radius: 40px; cursor: pointer; border: 1px solid #ff0000; }
        .size-btn.selected, .fabric-btn.selected { background: #ff0000; color: #000; }
        .qty-row { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .qty-btn { background: #1a1a1a; border: 1px solid #ff0000; color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        .qty-num { font-size: 1.2rem; min-width: 40px; text-align: center; }
        .add-cart-detail { background: #ff0000; border: none; color: #000; padding: 12px 30px; border-radius: 40px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; }
        .spec-box { margin-top: 1.5rem; border-top: 1px solid #333; padding-top: 1.2rem; }
        .spec-box h4 { color: #ff0000; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .reviews-area { margin-top: 2rem; text-align: center; padding: 1rem; border-top: 1px solid #333; color: #aaa; }
        .close-detail-btn { position: fixed; top: 20px; right: 20px; background: #ff0000; border: none; color: #000; font-size: 1.8rem; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 3100; }
        /* Cart Sidebar */
        .cart-sidebar { position: fixed; top: 0; right: -420px; width: 360px; height: 100%; background: #0a0a0a; z-index: 1500; transition: right 0.3s; padding: 1.5rem; overflow-y: auto; border-left: 2px solid #ff0000; }
        .cart-sidebar.open { right: 0; }
        .cart-item { display: flex; gap: 12px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #333; }
        .cart-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; }
        .cart-item-details { flex: 1; }
        .cart-remove { background: none; border: none; color: #aaa; cursor: pointer; }
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0a0a0a; backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 0.75rem 1rem; border-top: 1px solid #ff0000; z-index: 100; }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: #ccc; font-size: 1.2rem; cursor: pointer; font-weight: 500; }
        .bottom-nav-item span { font-size: 0.7rem; }
        .bottom-nav-item:hover, .bottom-nav-item.active { color: #ff0000; }
        /* Sidebar Menu */
        .sidebar-menu { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #0a0a0a; backdrop-filter: blur(20px); z-index: 2100; transition: left 0.3s; padding: 2rem 1.5rem; border-right: 2px solid #ff0000; }
        .sidebar-menu.open { left: 0; }
        .sidebar-menu .close-btn { background: none; border: none; color: white; font-size: 1.8rem; float: right; cursor: pointer; }
        .sidebar-menu ul { list-style: none; margin-top: 3rem; }
        .sidebar-menu li { margin: 1.5rem 0; font-size: 1.1rem; cursor: pointer; display: flex; gap: 12px; align-items: center; color: #fff; }
        .sidebar-menu li i { width: 28px; color: #ff0000; }
        /* Checkout */
        .back-button { background: #1a1a1a; border: 1px solid #ff0000; color: white; padding: 6px 18px; border-radius: 40px; cursor: pointer; display: inline-block; margin-bottom: 1rem; }
        .checkout-form { background: #111; border-radius: 28px; padding: 1.5rem; text-align: left; }
        .checkout-form input, .checkout-form textarea { width: 100%; padding: 10px; margin: 6px 0; background: #1a1a1a; border: 1px solid #ff0000; border-radius: 16px; color: white; outline: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; max-width: 500px; width: 90%; border-radius: 28px; padding: 1.8rem; border-top: 4px solid #ff0000; text-align: center; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 1.4rem; margin-bottom: 1rem; color: #ff0000; }
        .modal-btn { background: #ff0000; border: none; color: #000; padding: 8px 20px; border-radius: 40px; font-weight: bold; margin-top: 12px; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff0000; color: #000; padding: 10px 24px; border-radius: 50px; z-index: 3000; animation: fadeUp 0.3s; font-weight: bold; }
        @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        /* Admin Panel */
        .admin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 4000; backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; overflow-y: auto; }
        .admin-container { background: #0a0a0a; border: 1px solid #ff0000; border-radius: 32px; width: 95%; max-width: 1300px; max-height: 90vh; overflow-y: auto; margin: 2rem auto; padding: 1.5rem; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .admin-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; border-bottom: 1px solid #ff0000; margin-bottom: 1.5rem; padding-bottom: 0.5rem; }
        .admin-tab { background: none; border: none; color: #aaa; padding: 0.5rem 1rem; cursor: pointer; font-weight: 500; }
        .admin-tab.active { color: #ff0000; border-bottom: 2px solid #ff0000; }
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #333; }
        th { color: #ff0000; }
        .admin-btn { background: #ff0000; border: none; color: #000; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-top: 10px; }
        .admin-btn-secondary { background: #1a1a1a; border: 1px solid #ff0000; color: white; }
        .login-box { max-width: 400px; margin: 4rem auto; background: #0a0a0a; border: 1px solid #ff0000; border-radius: 32px; padding: 2rem; text-align: center; }
        .img-preview { max-width: 100px; max-height: 80px; margin-top: 8px; border-radius: 12px; border: 1px solid #ff0000; object-fit: cover; }
        .multi-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .price-input-group { margin-bottom: 10px; }
        .price-input-group label { display: inline-block; width: 150px; }
        @media (max-width: 700px) { .detail-flex { flex-direction: column; } .thumbnail { width: 50px; height: 50px; } }
    </style>
</head>
<body>

<header class="header">
    <button class="hamburger-icon" id="hamburgerOpenBtn"><i class="fas fa-bars"></i></button>
    <div class="logo-centered">ZCHOICE</div>
    <div class="right-icons">
        <button class="icon-btn search-icon" id="searchIconBtn"><i class="fas fa-search"></i></button>
        <div class="cart-icon-wrapper">
            <button class="icon-btn" id="cartIconBtn"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-count">0</span></button>
        </div>
        <button class="icon-btn" id="wishlistBtn"><i class="far fa-heart"></i></button>
        <button class="icon-btn" id="adminOpenBtn" style="color:#ff0000;"><i class="fas fa-user-cog"></i></button>
    </div>
</header>
<div class="search-overlay" id="searchOverlay"><input type="text" id="searchInput" placeholder="Search products..."></div>
<div id="hamburgerSidebar" class="sidebar-menu"><button class="close-btn" id="closeHamburger">&times;</button><ul>
    <li data-section="trackorder"><i class="fas fa-truck"></i> Track Order</li>
    <li data-section="contact"><i class="fas fa-headset"></i> Contact</li>
    <li data-section="about"><i class="fas fa-info-circle"></i> About</li>
    <li data-section="faq"><i class="fas fa-question-circle"></i> FAQ</li>
</ul></div>
<div class="main-container" id="mainContainer"></div>
<div class="bottom-nav">
    <button class="bottom-nav-item active" data-page="home"><i class="fas fa-home"></i><span>HOME</span></button>
    <button class="bottom-nav-item" data-page="shop"><i class="fas fa-store"></i><span>SHOP</span></button>
    <button class="bottom-nav-item" data-page="cart"><i class="fas fa-shopping-cart"></i><span>CART</span></button>
</div>
<div id="customModal" class="modal"><div class="modal-content"><div class="modal-header" id="modalTitle"></div><div id="modalBody"></div><button class="modal-btn" id="modalConfirmBtn">OK</button></div></div>
<div id="cartSidebar" class="cart-sidebar"><h3>Your Cart</h3><div id="cartItemsList"></div><div style="margin-top:20px;"><strong>Total: ৳<span id="cartTotalPrice">0.00</span></strong></div><button id="checkoutCartBtn" class="modal-btn" style="width:100%;">Proceed to Checkout</button></div>
<div id="adminOverlay" class="admin-overlay"><div class="admin-container" id="adminContainer"></div></div>
<div id="productDetailPage" class="product-detail-page"><button class="close-detail-btn" id="closeDetailPageBtn">&times;</button><div id="detailContent" class="detail-card"></div></div>

<script>
    // STORAGE KEYS
    const STORAGE_PRODUCTS = 'zchoice_products';
    const STORAGE_ORDERS = 'zchoice_orders';
    const STORAGE_CART = 'zchoice_cart';
    const STORAGE_WISHLIST = 'zchoice_wishlist';
    const STORAGE_BANNERS = 'zchoice_banners';
    const STORAGE_SETTINGS = 'zchoice_settings';
    const STORAGE_ADMIN_LOGGED = 'zchoice_admin_logged';
    const STORAGE_FABRICS = 'zchoice_fabrics';

    // Default fabrics
    const defaultFabrics = [
        { id: 1, name: "Jersey fabric" },
        { id: 2, name: "Cotton fabric" },
        { id: 3, name: "Drop shoulder" }
    ];

    let products = [], orders = [], cart = [], wishlist = [], banners = [], settings = [], fabrics = [];
    let currentFilter = "all", searchQuery = "", currentPage = "home", adInterval = null;
    let currentDetailProduct = null, selectedSize = "M", selectedFabric = null, quantity = 1, selectedImage = "";

    function resizeImageToBase64(file, maxWidth, maxHeight) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width, height = img.height;
                    if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function loadAllData() {
        products = JSON.parse(localStorage.getItem(STORAGE_PRODUCTS) || JSON.stringify([
            { id: 1, name: "Gojo Limitless Tee", basePrice: 899, images: ["https://placehold.co/400x500/111/ff0000?text=Gojo+1","https://placehold.co/400x500/222/ff0000?text=Gojo+2"], tag: "best", brand: "AnimeStreet", material: "100% Cotton", boxContent: "1 T-Shirt", fabricPrices: {} },
            { id: 2, name: "Itachi Uchiha Hoodie", basePrice: 1299, images: ["https://placehold.co/400x500/111/ff0000?text=Itachi+1","https://placehold.co/400x500/222/ff0000?text=Itachi+2"], tag: "limited", brand: "Akatsuki Wear", material: "80% Cotton", boxContent: "1 Hoodie", fabricPrices: {} }
        ]));
        orders = JSON.parse(localStorage.getItem(STORAGE_ORDERS) || "[]");
        cart = JSON.parse(localStorage.getItem(STORAGE_CART) || "[]");
        wishlist = JSON.parse(localStorage.getItem(STORAGE_WISHLIST) || "[]");
        banners = JSON.parse(localStorage.getItem(STORAGE_BANNERS) || JSON.stringify([
            { image: "https://placehold.co/1200x400/ff0000/white?text=ANIME+STREETWEAR" },
            { image: "https://placehold.co/1200x400/0000ff/white?text=LIMITED+EDITION" }
        ]));
        settings = JSON.parse(localStorage.getItem(STORAGE_SETTINGS) || JSON.stringify({ siteTitle: "ZCHOICE", contactEmail: "support@zchoice.com", contactPhone: "+880123456789", adminPasswordHash: btoa('459747') }));
        fabrics = JSON.parse(localStorage.getItem(STORAGE_FABRICS) || JSON.stringify(defaultFabrics));
        
        // Ensure all products have fabricPrices object
        products.forEach(p => { if (!p.fabricPrices) p.fabricPrices = {}; });
        updateCartBadge();
        document.querySelector('.logo-centered').innerText = settings.siteTitle;
    }
    function saveProducts() { localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products)); }
    function saveOrders() { localStorage.setItem(STORAGE_ORDERS, JSON.stringify(orders)); }
    function saveCart() { localStorage.setItem(STORAGE_CART, JSON.stringify(cart)); updateCartBadge(); }
    function saveWishlist() { localStorage.setItem(STORAGE_WISHLIST, JSON.stringify(wishlist)); }
    function saveBanners() { localStorage.setItem(STORAGE_BANNERS, JSON.stringify(banners)); }
    function saveSettings() { localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings)); }
    function saveFabrics() { localStorage.setItem(STORAGE_FABRICS, JSON.stringify(fabrics)); }
    function updateCartBadge() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantity,0); }
    function showToast(msg) { let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
    function showModal(title, body, onConfirm) { const modal = document.getElementById('customModal'); document.getElementById('modalTitle').innerText = title; document.getElementById('modalBody').innerHTML = body; modal.style.display = 'flex'; document.getElementById('modalConfirmBtn').onclick = () => { modal.style.display = 'none'; if(onConfirm) onConfirm(); }; }

    function addToCart(product, size, fabric, qty, imgUrl) {
        const finalPrice = product.fabricPrices && product.fabricPrices[fabric.id] ? product.fabricPrices[fabric.id] : product.basePrice;
        const existing = cart.find(i => i.id === product.id && i.size === size && i.fabricId === fabric.id);
        if (existing) existing.quantity += qty;
        else cart.push({ 
            id: product.id, name: product.name, basePrice: product.basePrice,
            size: size, fabricId: fabric.id, fabricName: fabric.name,
            quantity: qty, finalPrice: finalPrice, selectedImage: imgUrl, image: imgUrl
        });
        saveCart();
        showToast(`${product.name} (${size}, ${fabric.name}) x${qty} added!`);
        renderCartSidebar();
        if (currentPage === 'cart') renderCartPage();
    }
    function removeFromCart(index) { cart.splice(index,1); saveCart(); renderCartSidebar(); if(currentPage==='cart') renderCartPage(); }
    function renderCartSidebar() {
        const container = document.getElementById('cartItemsList');
        if(!container) return;
        if(cart.length===0) { container.innerHTML='<p>Cart empty</p>'; document.getElementById('cartTotalPrice').innerText='0.00'; return; }
        container.innerHTML = cart.map((item,idx)=>`<div class="cart-item"><img class="cart-item-img" src="${item.selectedImage}"><div class="cart-item-details"><div>${item.name}</div><div>Size: ${item.size} | Fabric: ${item.fabricName} | Qty: ${item.quantity}</div><div>৳ ${(item.finalPrice * item.quantity).toFixed(2)}</div></div><button class="cart-remove" data-idx="${idx}"><i class="fas fa-trash"></i></button></div>`).join('');
        document.querySelectorAll('.cart-remove').forEach(btn=>btn.addEventListener('click',()=>removeFromCart(parseInt(btn.dataset.idx))));
        document.getElementById('cartTotalPrice').innerText = cart.reduce((s,i)=>s+i.finalPrice*i.quantity,0).toFixed(2);
    }

    // Product detail with fabric-specific price
    function showProductDetail(productId) {
        currentDetailProduct = products.find(p => p.id === productId);
        if(!currentDetailProduct) return;
        selectedSize = "M"; quantity = 1;
        if(fabrics.length) selectedFabric = fabrics[0];
        else selectedFabric = { id: 1, name: "Standard" };
        const p = currentDetailProduct;
        const images = (p.images && p.images.length) ? p.images : ["https://placehold.co/400x500"];
        selectedImage = images[0];
        const sizes = ['S','M','L','XL'];
        
        function getPriceForFabric(fabric) {
            return (p.fabricPrices && p.fabricPrices[fabric.id]) ? p.fabricPrices[fabric.id] : p.basePrice;
        }
        function updateDisplayPrice() {
            const price = getPriceForFabric(selectedFabric);
            document.getElementById('dynamicPrice').innerText = `৳ ${price}`;
        }
        
        document.getElementById('detailContent').innerHTML = `
            <div class="detail-flex">
                <div class="detail-img-col">
                    <img id="detailMainImg" class="main-gallery-img" src="${selectedImage}">
                    <div class="thumbnail-row" id="thumbnailRow">
                        ${images.map((img,i)=>`<img class="thumbnail ${i===0?'active':''}" data-img="${img}" src="${img}">`).join('')}
                    </div>
                </div>
                <div class="detail-info-col">
                    <div class="detail-name">${p.name}</div>
                    <div class="detail-price" id="dynamicPrice">৳ ${getPriceForFabric(selectedFabric)}</div>
                    <div><strong>Product Options</strong><br>
                        <div class="size-group">${sizes.map(s=>`<div class="size-btn ${s===selectedSize?'selected':''}" data-size="${s}">${s}</div>`).join('')}</div>
                        <div class="fabric-group">${fabrics.map(f=>`<div class="fabric-btn ${f.id===selectedFabric.id?'selected':''}" data-fabric-id="${f.id}" data-fabric-name="${f.name}">${f.name}</div>`).join('')}</div>
                    </div>

    // Product listing (shows lowest price from fabricPrices or basePrice)
    function getLowestPrice(product) {
        if(product.fabricPrices && Object.keys(product.fabricPrices).length > 0) {
            return Math.min(...Object.values(product.fabricPrices));
        }
        return product.basePrice;
    }
    function getFilteredProducts() {
        let filtered = [...products];
        if(searchQuery) filtered = filtered.filter(p=>p.name.toLowerCase().includes(searchQuery));
        if(currentFilter==='best') filtered = filtered.filter(p=>p.tag==='best');
        else if(currentFilter==='new') filtered = filtered.filter(p=>p.tag==='new');
        else if(currentFilter==='limited') filtered = filtered.filter(p=>p.tag==='limited');
        return filtered;
    }
    function renderProducts(containerId) {
        const container = document.getElementById(containerId);
        if(!container) return;
        const filtered = getFilteredProducts();
        if(filtered.length===0) { container.innerHTML='<div style="text-align:center; padding:2rem;">No products found</div>'; return; }
        container.innerHTML = filtered.map(p=>`<div class="product-card" data-id="${p.id}"><img class="product-img" src="${(p.images && p.images[0]) || 'https://placehold.co/400x500'}" onerror="this.src='https://placehold.co/400x500/ff0000/white?text=Error'"><div class="product-info"><div class="product-title">${p.name}</div><div class="product-price">৳ ${getLowestPrice(p)}</div></div><div class="product-actions"><button class="action-icon add-cart-quick" data-id="${p.id}"><i class="fas fa-cart-plus"></i></button><button class="action-icon wishlist-act" data-id="${p.id}"><i class="fas ${wishlist.includes(p.id)?'fa-heart':'fa-heart-o'}"></i></button><button class="action-icon view-detail" data-id="${p.id}"><i class="fas fa-eye"></i></button></div></div>`).join('');
        container.querySelectorAll('.add-cart-quick').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); const prod=products.find(p=>p.id===parseInt(btn.dataset.id)); if(prod && fabrics.length) addToCart(prod, "M", fabrics[0], 1, prod.images?.[0] || "https://placehold.co/400x500"); }));
        container.querySelectorAll('.wishlist-act').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id=parseInt(btn.dataset.id); if(wishlist.includes(id)) wishlist=wishlist.filter(i=>i!==id); else wishlist.push(id); saveWishlist(); renderCurrentPage(); }));
        container.querySelectorAll('.view-detail').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); showProductDetail(parseInt(btn.dataset.id)); }));
        container.querySelectorAll('.product-card').forEach(card=>card.addEventListener('click',(e)=>{ if(!e.target.closest('.action-icon')) showProductDetail(parseInt(card.dataset.id)); }));

    function showCheckoutForm() {
        if(cart.length===0) return;
        const total = cart.reduce((s,i)=>s+i.finalPrice*i.quantity,0).toFixed(2);
        showModal('Complete Order', `<div class="checkout-form"><h3>Delivery Details</h3><input type="text" id="fullName" placeholder="Full Name *"><input type="tel" id="phone" placeholder="Phone *"><input type="email" id="email" placeholder="Email *"><textarea id="address" rows="2" placeholder="Address *"></textarea><div class="payment-card"><i class="fas fa-truck"></i><h4>Cash on Delivery</h4></div><p><strong>Total: ৳ ${total}</strong></p><button id="confirmOrderBtn" class="modal-btn">PLACE ORDER</button><button id="cancelOrderBtn" class="modal-btn" style="background:#333;">Cancel</button></div>`, ()=>{}); 
        setTimeout(()=>{
            document.getElementById('confirmOrderBtn').onclick = () => {
                const name = document.getElementById('fullName')?.value.trim();
                const phone = document.getElementById('phone')?.value.trim();
                const email = document.getElementById('email')?.value.trim();
                const address = document.getElementById('address')?.value.trim();
                if(!name||!phone||!email||!address) { showToast('Fill all fields'); return; }
                const orderId = 'ORD'+Date.now()+Math.floor(Math.random()*1000);
                const items = cart.map(i=>({name:i.name, size:i.size, fabric:i.fabricName, quantity:i.quantity, price:i.finalPrice, image:i.selectedImage}));
                const itemsHtml = cart.map(i=>`<tr><td><img src="${i.selectedImage}" width="50"></td><td>${i.name} (${i.size}, ${i.fabricName})</td><td>x${i.quantity}</td><td>৳${(i.finalPrice*i.quantity).toFixed(2)}</td></tr>`).join('');
                const order = { id:orderId, date:new Date().toISOString(), customerName:name, phone, email, address, paymentMethod:'Cash on Delivery', total:parseFloat(total), items, status:'Pending' };
                orders.push(order); saveOrders();
                const receipt = `<div style="background:white; color:black; padding:20px;"><h1 style="color:#ff0000;">ZCHOICE</h1><p>Order: ${orderId}<br>Date: ${new Date().toLocaleString()}</p><h3>Customer</h3><p>${name}<br>${phone}<br>${email}<br>${address}</p><h3>Items</h3><table border="1" cellpadding="5" style="width:100%;">${itemsHtml}</table><h3>Total: ৳ ${total}</h3><p>Payment: Cash on Delivery</p><p>Thank you!</p></div>`;
                cart = []; saveCart(); document.getElementById('customModal').style.display='none';
                showModal('Order Placed', `<div id="receiptContent">${receipt}</div><button id="downloadPdfBtn" class="modal-btn">Download PDF Receipt</button>`, ()=>{}); 
                setTimeout(()=>{ document.getElementById('downloadPdfBtn')?.addEventListener('click',()=>{ html2pdf().from(document.getElementById('receiptContent')).set({margin:0.5, filename:`Zchoice_${orderId}.pdf`}).save(); }); },100);
                renderCartSidebar(); if(currentPage==='cart') renderCartPage();
            };
            document.getElementById('cancelOrderBtn').onclick = () => document.getElementById('customModal').style.display='none';
        },50);
    }

            showModal('Add Banner', `<div><input type="file" id="newBannerImg"><div id="bannerPreview"></div><button id="saveBanBtn" class="admin-btn">Save</button></div>`, ()=>{});
            setTimeout(()=>{
                document.getElementById('newBannerImg').onchange = async (e) => { if(e.target.files[0]){ imgData = await resizeImageToBase64(e.target.files[0],1200,400); document.getElementById('bannerPreview').innerHTML = `<img src="${imgData}" class="img-preview">`; } };
                document.getElementById('saveBanBtn').onclick = () => { if(imgData){ banners.push({image:imgData}); saveBanners(); refresh(); renderHome(); document.getElementById('customModal').style.display='none'; } };
            },50);
        };
        window.editBanner = (idx) => {
            const ban = banners[idx];
            let newImg = null;
            showModal('Edit Banner', `<div><input type="file" id="editBannerImg"><div><img src="${ban.image}" class="img-preview"></div><button id="updateBanBtn" class="admin-btn">Update</button></div>`, ()=>{});
            setTimeout(()=>{
                document.getElementById('editBannerImg').onchange = async (e) => { if(e.target.files[0]){ newImg = await resizeImageToBase64(e.target.files[0],1200,400); document.getElementById('editBannerImg').parentElement.innerHTML += `<img src="${newImg}" class="img-preview">`; } };
                document.getElementById('updateBanBtn').onclick = () => { if(newImg){ banners[idx].image = newImg; saveBanners(); refresh(); renderHome(); document.getElementById('customModal').style.display='none'; } };
            },50);
        };
    }
    function renderAdminFabrics() {
        const panel = document.getElementById('adminFabricsPanel');
        panel.innerHTML = `<button id="addFabricBtn" class="admin-btn">+ Add Fabric</button><table><thead><th>ID</th><th>Fabric Name</th><th>Actions</th></thead><tbody id="adminFabricsTable"></tbody></table>`;
        function refreshFabrics(){
            const tbody = document.getElementById('adminFabricsTable');
            tbody.innerHTML = fabrics.map(f=>`<tr><td>${f.id}</td><td>${f.name}</td><td><button class="admin-btn-secondary edit-fabric" data-id="${f.id}">Edit</button> <button class="admin-btn-secondary del-fabric" data-id="${f.id}">Delete</button></td></tr>`).join('');
            document.querySelectorAll('.edit-fabric').forEach(btn=>btn.addEventListener('click',()=>editFabric(parseInt(btn.dataset.id))));
            document.querySelectorAll('.del-fabric').forEach(btn=>btn.addEventListener('click',()=>{ if(confirm('Delete this fabric? It will be removed from product pricing as well.')){ fabrics=fabrics.filter(f=>f.id!==parseInt(btn.dataset.id)); saveFabrics(); refreshFabrics(); } }));
        }
        refreshFabrics();
        window.editFabric = (id) => {
            const f = fabrics.find(f=>f.id===id);
            showModal('Edit Fabric', `<div><input id="fName" value="${f.name}" placeholder="Fabric Name"><button id="updateFabricBtn" class="admin-btn">Update</button></div>`, ()=>{});
            setTimeout(()=>{
                document.getElementById('updateFabricBtn').onclick = () => {
                    f.name = document.getElementById('fName').value;
                    saveFabrics(); refreshFabrics();
                    document.getElementById('customModal').style.display='none';
                    showToast('Fabric updated');
                };
            },50);
        };
        document.getElementById('addFabricBtn').onclick = () => {
            showModal('Add Fabric', `<div><input id="newFName" placeholder="Fabric Name"><button id="saveFabricBtn" class="admin-btn">Save</button></div>`, ()=>{});
            setTimeout(()=>{
                document.getElementById('saveFabricBtn').onclick = () => {
                    const name = document.getElementById('newFName').value;
                    if(!name) { showToast('Enter fabric name'); return; }
                    const newId = fabrics.length ? Math.max(...fabrics.map(f=>f.id))+1 : 1;
                    fabrics.push({ id:newId, name });
                    saveFabrics(); refreshFabrics();
                    document.getElementById('customModal').style.display='none';
                    showToast('Fabric added');
                };
            },50);
        };
    }
    function renderAdminSettings() {
        document.getElementById('adminSettingsPanel').innerHTML = `<div><label>Site Title</label><input id="stTitle" value="${settings.siteTitle}"><label>Contact Email</label><input id="stEmail" value="${settings.contactEmail}"><label>Admin Password (new)</label><input type="password" id="newAdminPwd" placeholder="Change password"><button id="saveSettingsBtn" class="admin-btn">Save</button></div>`;
        document.getElementById('saveSettingsBtn').onclick = () => {
            settings.siteTitle = document.getElementById('stTitle').value;
            settings.contactEmail = document.getElementById('stEmail').value;
            const newPwd = document.getElementById('newAdminPwd').value;
            if(newPwd) settings.adminPasswordHash = btoa(newPwd);
            saveSettings();
            document.querySelector('.logo-centered').innerText = settings.siteTitle;
            showToast('Settings saved');
        };
    }

    // Event Listeners
    document.querySelectorAll('.bottom-nav-item').forEach(btn=>btn.addEventListener('click',()=>{ const page=btn.dataset.page; if(page==='home') renderHome(); else if(page==='shop') renderShop(); else if(page==='cart') renderCartPage(); document.querySelectorAll('.bottom-nav-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }));
    document.getElementById('cartIconBtn').addEventListener('click',()=>document.getElementById('cartSidebar').classList.toggle('open'));
    document.getElementById('checkoutCartBtn').addEventListener('click',()=>showCheckoutForm());
    document.getElementById('wishlistBtn').addEventListener('click',()=>{ if(wishlist.length) showModal('Wishlist', wishlist.map(id=>products.find(p=>p.id===id)?.name).join('<br>'),()=>{}); else showToast('Empty'); });
    document.getElementById('hamburgerOpenBtn').onclick=()=>document.getElementById('hamburgerSidebar').classList.add('open');
    document.getElementById('closeHamburger').onclick=()=>document.getElementById('hamburgerSidebar').classList.remove('open');
    document.querySelectorAll('#hamburgerSidebar li').forEach(li=>li.addEventListener('click',()=>{ showSidebarPage(li.dataset.section); document.getElementById('hamburgerSidebar').classList.remove('open'); }));
    document.getElementById('searchIconBtn').onclick=()=>{ const ov=document.getElementById('searchOverlay'); ov.style.display=ov.style.display==='none'||!ov.style.display?'block':'none'; if(ov.style.display==='block') document.getElementById('searchInput').focus(); };
    document.addEventListener('click',(e)=>{ const sidebar=document.getElementById('cartSidebar'); if(!sidebar.contains(e.target) && !document.getElementById('cartIconBtn').contains(e.target)) sidebar.classList.remove('open'); });
    document.getElementById('adminOpenBtn').onclick=()=>{ document.getElementById('adminOverlay').style.display='flex'; checkAdminLogin(); };
    document.getElementById('adminOverlay').addEventListener('click',(e)=>{ if(e.target===document.getElementById('adminOverlay')) document.getElementById('adminOverlay').style.display='none'; });
    document.getElementById('closeDetailPageBtn').onclick=closeDetailPage;
    document.getElementById('productDetailPage').addEventListener('click',(e)=>{ if(e.target===document.getElementById('productDetailPage')) closeDetailPage(); });
    loadAllData(); renderHome();
</script>
</body>
</html>
