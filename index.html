<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Zchoice | Anime Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000000; color: #ffffff; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }
        body { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><polygon points="2,2 22,13 12,16 2,25" fill="%23ff0000" stroke="%23fff" stroke-width="1.5"/><circle cx="12" cy="13" r="3" fill="%23fff"/></svg>') 12 8, auto; }
        
        /* Header: search left (smaller), logo center, icons right */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; background: #0a0a0a; backdrop-filter: blur(12px);
            padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center;
            z-index: 1100; border-bottom: 1px solid #ff0000; flex-wrap: wrap; gap: 10px;
        }
        .search-bar {
            background: #1a1a1a;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            border: 1px solid #ff0000;
            display: flex;
            gap: 8px;
            width: 180px; /* smaller search bar */
        }
        .search-bar input { background: transparent; border: none; outline: none; color: white; width: 100%; }
        .search-bar i { color: #ff0000; }
        
        .logo-centered {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff0000);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            flex-grow: 1;
        }
        .nav-icons {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .icon-btn { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; position: relative; transition: 0.2s; }
        .icon-btn:hover { color: #ff0000; }
        .cart-count { position: absolute; top: -8px; right: -12px; background: #ff0000; color: #000; font-weight: bold; border-radius: 30px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        
        .main-container { margin-top: 90px; padding: 1.5rem 5% 80px 5%; }
        
        /* Full-width rotating ad banner (replaces old hero) */
        .ad-banner {
            width: 100%;
            height: 320px;
            background: #0a0a0a;
            border: 1px solid #ff0000;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            margin-bottom: 2rem;
        }
        .ad-banner-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .ad-banner-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            background-blend-mode: overlay;
            background-color: rgba(0,0,0,0.7);
        }
        .ad-banner-slide.active {
            opacity: 1;
            position: relative;
        }
        .ad-banner-title {
            font-size: 2rem;
            font-weight: 800;
            color: #ff0000;
            margin-bottom: 0.5rem;
        }
        .ad-banner-desc {
            font-size: 1.2rem;
            color: white;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .feature-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            transition: 0.2s;
        }
        .feature-card:hover { border-color: #ff0000; }
        .feature-card i { font-size: 1.8rem; color: #ff0000; margin-bottom: 0.5rem; }
        .feature-card h4 { font-size: 1rem; margin-bottom: 0.25rem; }
        .feature-card p { font-size: 0.75rem; color: #aaa; }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 2rem 0 1rem 0;
        }
        .section-header h2 { font-size: 1.5rem; font-weight: 600; }
        .view-all { color: #ff0000; font-weight: 500; cursor: pointer; font-size: 0.9rem; }
        
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 1rem 0 1.5rem 0;
            justify-content: center;
        }
        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .filter-btn:hover, .filter-btn.active { background: #ff0000; color: #000; }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #333;
        }
        .product-card:hover { transform: translateY(-4px); border-color: #ff0000; box-shadow: 0 8px 20px rgba(255,0,0,0.2); }
        .product-img { width: 100%; height: 220px; object-fit: cover; }
        .product-info { padding: 0.8rem; text-align: center; }
        .product-title { font-weight: 600; font-size: 0.9rem; }
        .product-price { color: #ff0000; font-weight: bold; margin-top: 5px; font-size: 1rem; }
        .product-actions { display: flex; justify-content: center; gap: 12px; padding: 0 0.8rem 0.8rem 0.8rem; }
        .action-icon { background: rgba(255,255,255,0.1); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .action-icon:hover { background: #ff0000; color: #000; }
        
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 1rem 0 2rem 0;
        }
        .anime-card {
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.2s;
            text-align: center;
        }
        .anime-card img { width: 100%; height: 220px; object-fit: cover; }
        .anime-card h3 { padding: 0.8rem; font-size: 1rem; }
        .anime-card:hover { border-color: #ff0000; transform: translateY(-4px); }
        
        .fs-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .fs-modal img { max-width: 90%; max-height: 85%; border-radius: 24px; box-shadow: 0 0 30px #ff0000; }
        .fs-close { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: white; cursor: pointer; background: none; border: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1800; justify-content: center; align-items: center; }
        .modal-content { background: #111; max-width: 400px; width: 90%; border-radius: 28px; padding: 1.8rem; border-top: 4px solid #ff0000; text-align: center; }
        .modal-header { font-size: 1.4rem; margin-bottom: 1rem; color: #ff0000; }
        .size-selector { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
        .size-opt { background: #222; padding: 6px 16px; border-radius: 40px; cursor: pointer; color: white; }
        .size-opt:hover, .size-opt.selected { background: #ff0000; color: #000; }
        .modal-btn { background: #ff0000; border: none; color: #000; padding: 8px 20px; border-radius: 40px; font-weight: bold; margin-top: 12px; cursor: pointer; }
        .cart-sidebar { position: fixed; top: 0; right: -420px; width: 360px; height: 100%; background: #0a0a0a; z-index: 1500; transition: right 0.3s; padding: 1.5rem; overflow-y: auto; border-left: 2px solid #ff0000; }
        .cart-sidebar.open { right: 0; }
        .cart-item { display: flex; gap: 12px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #333; }
        .cart-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; }
        .cart-item-details { flex: 1; }
        .cart-remove { background: none; border: none; color: #aaa; cursor: pointer; }
        .cart-remove:hover { color: #ff0000; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff0000; color: #000; padding: 10px 24px; border-radius: 50px; z-index: 3000; animation: fadeUp 0.3s; font-weight: bold; }
        @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0a0a0a;
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 1rem;
            border-top: 1px solid #ff0000;
            z-index: 100;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .bottom-nav-item span { font-size: 0.7rem; }
        .bottom-nav-item:hover, .bottom-nav-item.active { color: #ff0000; }
        
        .sidebar-menu { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #0a0a0a; backdrop-filter: blur(20px); z-index: 2100; transition: left 0.3s; padding: 2rem 1.5rem; border-right: 2px solid #ff0000; }
        .sidebar-menu.open { left: 0; }
        .sidebar-menu .close-btn { background: none; border: none; color: white; font-size: 1.8rem; float: right; cursor: pointer; }
        .sidebar-menu ul { list-style: none; margin-top: 3rem; }
        .sidebar-menu li { margin: 1.5rem 0; font-size: 1.1rem; cursor: pointer; display: flex; gap: 12px; align-items: center; color: #fff; }
        .sidebar-menu li i { width: 28px; color: #ff0000; }
        .sidebar-menu li:hover { color: #ff0000; transform: translateX(6px); }
        .back-button { background: #1a1a1a; border: 1px solid #ff0000; color: white; padding: 6px 18px; border-radius: 40px; cursor: pointer; display: inline-block; margin-bottom: 1rem; }
        .checkout-form { background: #111; border-radius: 28px; padding: 1.5rem; text-align: left; }
        .checkout-form input, .checkout-form textarea, .checkout-form select { width: 100%; padding: 10px; margin: 6px 0; background: #1a1a1a; border: 1px solid #ff0000; border-radius: 16px; color: white; outline: none; }
        
        @media (max-width: 700px) {
            .header { flex-direction: column; }
            .logo-centered { order: 1; margin: 0.5rem 0; }
            .search-bar { order: 2; width: 100%; }
            .nav-icons { order: 3; }
            .ad-banner { height: 220px; }
            .ad-banner-title { font-size: 1.3rem; }
            .ad-banner-desc { font-size: 0.9rem; }
            .main-container { margin-top: 150px; }
            .product-grid, .anime-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search..."></div>
    <div class="logo-centered">ZCHOICE</div>
    <div class="nav-icons">
        <button class="icon-btn" id="wishlistBtn"><i class="far fa-heart"></i></button>
        <button class="icon-btn" id="cartIconBtn"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-count">0</span></button>
    </div>
</header>

<div id="hamburgerSidebar" class="sidebar-menu">
    <button class="close-btn" id="closeHamburger">&times;</button>
    <ul>
        <li data-section="categories"><i class="fas fa-tags"></i> Categories</li>
        <li data-section="trackorder"><i class="fas fa-truck"></i> Track Order</li>
        <li data-section="contact"><i class="fas fa-headset"></i> Contact</li>
        <li data-section="about"><i class="fas fa-info-circle"></i> About</li>
        <li data-section="faq"><i class="fas fa-question-circle"></i> FAQ</li>
    </ul>
</div>
<button id="hamburgerOpenBtn" style="position:fixed; top:100px; left:15px; z-index:1100; background:#ff0000; border:none; width:42px; height:42px; border-radius:50%; color:#000; font-size:1.2rem; cursor:pointer;"><i class="fas fa-bars"></i></button>

<div class="main-container" id="mainContainer"></div>

<div class="bottom-nav">
    <button class="bottom-nav-item" data-page="home"><i class="fas fa-home"></i><span>HOME</span></button>
    <button class="bottom-nav-item" data-page="shop"><i class="fas fa-store"></i><span>SHOP</span></button>
    <button class="bottom-nav-item" data-page="customize"><i class="fas fa-palette"></i><span>CUSTOMIZE</span></button>
    <button class="bottom-nav-item" data-page="cart"><i class="fas fa-shopping-cart"></i><span>CART</span></button>
</div>

<div id="fullscreenModal" class="fs-modal"><button class="fs-close" id="fsCloseBtn">&times;</button><img id="fsImage" src=""></div>
<div id="customModal" class="modal"><div class="modal-content"><div class="modal-header" id="modalTitle"></div><div id="modalBody"></div><button class="modal-btn" id="modalConfirmBtn">OK</button></div></div>
<div id="cartSidebar" class="cart-sidebar"><h3 style="margin-bottom:1rem;">Your Cart</h3><div id="cartItemsList"></div><div style="margin-top:20px;"><strong>Total: ₱<span id="cartTotalPrice">0.00</span></strong></div><button id="checkoutCartBtn" style="background:#ff0000; width:100%; margin-top:20px; padding:10px; border:none; border-radius:40px; font-weight:bold; cursor:pointer;">Proceed to Checkout</button></div>

<script>
    const products = [
        { id: 1, name: "Gojo Limitless Tee", anime: "Jujutsu Kaisen", price: 899, image: "https://placehold.co/400x500/111/ff0000?text=Gojo+Tee", sales: 200, tag: "best" },
        { id: 2, name: "Itachi Uchiha Hoodie", anime: "Naruto", price: 1299, image: "https://placehold.co/400x500/111/ff0000?text=Itachi+Hoodie", sales: 150, tag: "limited" },
        { id: 3, name: "Naruto Sage Mode Tee", anime: "Naruto", price: 899, image: "https://placehold.co/400x500/111/ff0000?text=Naruto+Sage", sales: 180, tag: "new" },
        { id: 4, name: "Sukuna Finger Tee", anime: "Jujutsu Kaisen", price: 999, image: "https://placehold.co/400x500/111/ff0000?text=Sukuna+Tee", sales: 120, tag: "best" },
        { id: 5, name: "Luffy Gear 5 Tee", anime: "One Piece", price: 899, image: "https://placehold.co/400x500/111/ff0000?text=Luffy+Gear5", sales: 220, tag: "new" },
        { id: 6, name: "Levi Wings Hoodie", anime: "Attack on Titan", price: 1299, image: "https://placehold.co/400x500/111/ff0000?text=Levi+Hoodie", sales: 130, tag: "limited" },
        { id: 7, name: "Tanjiro Sun Tee", anime: "Demon Slayer", price: 899, image: "https://placehold.co/400x500/111/ff0000?text=Tanjiro", sales: 110, tag: "best" },
        { id: 8, name: "Eren Attack Tee", anime: "Attack on Titan", price: 999, image: "https://placehold.co/400x500/111/ff0000?text=Eren", sales: 95, tag: "new" }
    ];
    const animeList = [
        { name: "Naruto", image: "https://placehold.co/400x220/111/ff0000?text=Naruto" },
        { name: "Jujutsu Kaisen", image: "https://placehold.co/400x220/111/ff0000?text=Jujutsu+Kaisen" },
        { name: "One Piece", image: "https://placehold.co/400x220/111/ff0000?text=One+Piece" },
        { name: "Attack on Titan", image: "https://placehold.co/400x220/111/ff0000?text=Attack+on+Titan" },
        { name: "Demon Slayer", image: "https://placehold.co/400x220/111/ff0000?text=Demon+Slayer" },
        { name: "Solo Leveling", image: "https://placehold.co/400x220/111/ff0000?text=Solo+Leveling" }
    ];
    
    // Rotating ads for full-width banner
    const adSlides = [
        { title: "🔥 LIMITED DROP", desc: "30% OFF all tees", bg: "linear-gradient(135deg, #000, #3a0000)" },
        { title: "⚡ NEW COLLECTION", desc: "Jujutsu Kaisen Neon", bg: "linear-gradient(135deg, #1a0000, #000)" },
        { title: "💀 DEMON SLAYER", desc: "Hashira limited edition", bg: "linear-gradient(135deg, #2a0000, #000)" },
        { title: "🎁 FREE SHIPPING", desc: "On orders over ₱1500", bg: "linear-gradient(135deg, #000, #4a0000)" }
    ];
    
    let cart = [], wishlistIds = [];
    let currentFilter = "all", searchQuery = "", currentPage = "home", pendingProduct = null, currentAnime = null;
    
    function showToast(msg) { let t=document.createElement("div"); t.className="toast"; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
    function showModal(title, body, onConfirm=null) {
        let modal=document.getElementById("customModal");
        document.getElementById("modalTitle").innerText=title;
        document.getElementById("modalBody").innerHTML=body;
        modal.style.display="flex";
        let btn=document.getElementById("modalConfirmBtn");
        let close=()=>{ modal.style.display="none"; if(onConfirm) onConfirm(); };
        btn.onclick=close;
    }
    function openSizeSelector(product) {
        pendingProduct=product;
        showModal("Select Size", `<div class="size-selector" id="sizeSelector">${['S','M','L','XL'].map(s=>`<div class="size-opt" data-size="${s}">${s}</div>`).join('')}</div>`);
        setTimeout(()=>{
            document.querySelectorAll('.size-opt').forEach(opt=>{
                opt.addEventListener('click',()=>{
                    let size=opt.getAttribute('data-size');
                    addToCart(pendingProduct, size);
                    document.getElementById("customModal").style.display="none";
                });
            });
        },50);
    }
    function addToCart(product, size) {
        let existing=cart.find(i=>i.id===product.id && i.size===size);
        if(existing) existing.quantity++;
        else cart.push({...product, quantity:1, size:size});
        updateCartUI();
        showToast(`${product.name} (${size}) added to cart!`);
        saveData();
    }
    function removeFromCart(index) { cart.splice(index,1); updateCartUI(); showToast("Item removed"); saveData(); }
    function updateCartUI() {
        let totalItems=cart.reduce((s,i)=>s+i.quantity,0);
        document.getElementById("cartCount").innerText=totalItems;
        let totalPrice=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
        document.getElementById("cartTotalPrice").innerText=totalPrice.toFixed(2);
        renderCartSidebar();
        saveData();
    }
    function toggleWishlist(id) {
        if(wishlistIds.includes(id)) { wishlistIds=wishlistIds.filter(i=>i!==id); showToast("Removed from wishlist"); }
        else { wishlistIds.push(id); showToast("Added to wishlist"); }
        saveData(); renderCurrentPage();
    }
    function isWishlisted(id) { return wishlistIds.includes(id); }
    function saveData() { localStorage.setItem("animeCart",JSON.stringify(cart)); localStorage.setItem("animeWishlist",JSON.stringify(wishlistIds)); }
    function loadData() { let c=localStorage.getItem("animeCart"); if(c) cart=JSON.parse(c); let w=localStorage.getItem("animeWishlist"); if(w) wishlistIds=JSON.parse(w); updateCartUI(); }
    
    function getFilteredProducts(animeName = null) {
        let filtered = [...products];
        if (animeName) filtered = filtered.filter(p => p.anime === animeName);
        if (searchQuery && !animeName) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery) || p.anime.toLowerCase().includes(searchQuery));
        if (currentFilter === "best") filtered = filtered.filter(p => p.tag === "best");
        else if (currentFilter === "new") filtered = filtered.filter(p => p.tag === "new");
        else if (currentFilter === "limited") filtered = filtered.filter(p => p.tag === "limited");
        return filtered;
    }
    
    function renderProductsGrid(containerId, animeName = null) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let filtered = getFilteredProducts(animeName);
        if (filtered.length === 0) { container.innerHTML = "<div style='text-align:center; padding:2rem;'>No products found</div>"; return; }
        container.innerHTML = filtered.map(p => `
            <div class="product-card">
                <img class="product-img" src="${p.image}" data-full="${p.image}" alt="${p.name}">
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">₱ ${p.price}</div>
                </div>
                <div class="product-actions">
                    <button class="action-icon add-cart" data-id="${p.id}"><i class="fas fa-cart-plus"></i></button>
                    <button class="action-icon wishlist-act" data-id="${p.id}"><i class="fas ${isWishlisted(p.id)?'fa-heart':'fa-heart-o'}"></i></button>
                    <button class="action-icon fullview" data-img="${p.image}"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.add-cart').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let id=parseInt(btn.getAttribute('data-id')); let prod=products.find(p=>p.id===id); if(prod) openSizeSelector(prod); }));
        document.querySelectorAll('.wishlist-act').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let id=parseInt(btn.getAttribute('data-id')); toggleWishlist(id); }));
        document.querySelectorAll('.fullview').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let src=btn.getAttribute('data-img'); openFullscreen(src); }));
        document.querySelectorAll('.product-img').forEach(img=>img.addEventListener('click',()=>openFullscreen(img.getAttribute('data-full'))));
    }
    
    function openFullscreen(src){ let modal=document.getElementById("fullscreenModal"); document.getElementById("fsImage").src=src; modal.style.display="flex"; document.getElementById("fsCloseBtn").onclick=()=>modal.style.display="none"; modal.onclick=(e)=>{ if(e.target===modal) modal.style.display="none"; }; }
    
    function renderCartSidebar() {
        let container=document.getElementById("cartItemsList");
        if(!container) return;
        if(cart.length===0){ container.innerHTML="<p>Cart empty</p>"; return; }
        container.innerHTML=cart.map((item,idx)=>`
            <div class="cart-item">
                <img class="cart-item-img" src="${item.image}">
                <div class="cart-item-details">
                    <div>${item.name}</div>
                    <div>Size: ${item.size} | Qty: ${item.quantity}</div>
                    <div>₱ ${(item.price*item.quantity).toFixed(2)}</div>
                </div>
                <button class="cart-remove" data-idx="${idx}"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
        document.querySelectorAll('.cart-remove').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx=parseInt(btn.getAttribute('data-idx')); removeFromCart(idx); }));
    }
    
    function showCheckoutForm() {
        if(cart.length===0){ showToast("Cart is empty"); return; }
        let total=cart.reduce((s,i)=>s+(i.price*i.quantity),0).toFixed(2);
        let html=`
            <div class="checkout-form">
                <h3 style="margin-bottom:1rem;">Delivery Details</h3>
                <label>Full Name *</label><input type="text" id="fullName" placeholder="John Doe">
                <label>Phone Number *</label><input type="tel" id="phone" placeholder="+8801xxxxxxxxx">
                <label>Email Address *</label><input type="email" id="email" placeholder="email@example.com">
                <label>Delivery Address *</label><textarea id="address" rows="2" placeholder="House, Road, City"></textarea>
                <label>Payment Method</label><select id="paymentMethod"><option>Cash on Delivery</option><option>Credit Card</option><option>bKash</option></select>
                <p style="margin-top:12px;"><strong>Total: ₱ ${total}</strong></p>
                <button id="confirmOrderBtn" style="background:#ff0000; border:none; padding:10px; width:100%; border-radius:40px; font-weight:bold; margin-top:12px;">PLACE ORDER</button>
                <button id="cancelOrderBtn" style="background:#333; margin-top:8px; cursor:pointer;">Cancel</button>
            </div>
        `;
        showModal("Complete Order", html, null);
        setTimeout(()=>{
            let confirmBtn=document.getElementById("confirmOrderBtn");
            let cancelBtn=document.getElementById("cancelOrderBtn");
            if(confirmBtn){
                confirmBtn.onclick=()=>{
                    let name=document.getElementById("fullName")?.value.trim();
                    let phone=document.getElementById("phone")?.value.trim();
                    let email=document.getElementById("email")?.value.trim();
                    let address=document.getElementById("address")?.value.trim();
                    if(!name || !phone || !email || !address){ showToast("Please fill all fields"); return; }
                    let orderId="ORD"+Math.floor(Math.random()*1000000);
                    let itemsHtml=cart.map(i=>`${i.name} (${i.size}) x${i.quantity} = ₱${(i.price*i.quantity).toFixed(2)}`).join("<br>");
                    let receiptHtml=`
                        <div id="pdfReceipt" style="font-family:Inter; max-width:800px; margin:0 auto; padding:20px; background:white; color:black;">
                            <div style="text-align:center; border-bottom:2px solid #ff0000;"><h1 style="color:#ff0000;">ZCHOICE</h1><p>Anime Streetwear</p></div>
                            <div><strong>Order ID:</strong> ${orderId}<br><strong>Date:</strong> ${new Date().toLocaleString()}</div>
                            <div style="background:#f4f4f4; padding:12px; margin:15px 0;"><h3>Customer</h3><p>${name}<br>${phone}<br>${email}<br>${address}</p></div>
                            <div><h3>Items</h3>${itemsHtml}</div>
                            <div style="text-align:right;"><h3>Total: ₱ ${total}</h3></div>
                            <div style="text-align:center;">Thank you!</div>
                        </div>
                    `;
                    cart=[];
                    updateCartUI();
                    saveData();
                    document.getElementById("customModal").style.display="none";
                    showModal("Order Placed", `<div id="receiptContent">${receiptHtml}</div><button id="downloadPdfBtn" class="modal-btn" style="margin-top:15px;">Download PDF</button>`, null);
                    setTimeout(()=>{
                        let pdfBtn=document.getElementById("downloadPdfBtn");
                        if(pdfBtn) pdfBtn.onclick=()=>{ let element=document.getElementById("receiptContent"); html2pdf().from(element).set({ margin:0.5, filename:`Zchoice_${orderId}.pdf`, html2canvas:{scale:2}, jsPDF:{unit:'in', format:'a4', orientation:'portrait'} }).save(); };
                    },100);
                };
            }
            if(cancelBtn) cancelBtn.onclick=()=>document.getElementById("customModal").style.display="none";
        },50);
    }
    
    // Full-width rotating ad banner initialization
    let adInterval;
    function initFullWidthAdBanner() {
        const container = document.getElementById("fullWidthAdContainer");
        if (!container) return;
        container.innerHTML = adSlides.map((ad, idx) => `
            <div class="ad-banner-slide" data-idx="${idx}" style="background-image: ${ad.bg}; background-size: cover;">
                <div class="ad-banner-title">${ad.title}</div>
                <div class="ad-banner-desc">${ad.desc}</div>
            </div>
        `).join('');
        let current = 0;
        const slides = document.querySelectorAll('.ad-banner-slide');
        if (slides.length) slides[0].classList.add('active');
        if (adInterval) clearInterval(adInterval);
        adInterval = setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 2000);
    }
    
    function renderHome() {
        currentPage = "home"; currentAnime = null;
        const container = document.getElementById("mainContainer");
        container.innerHTML = `
            <div class="ad-banner">
                <div class="ad-banner-container" id="fullWidthAdContainer"></div>
            </div>
            <div class="features">
                <div class="feature-card"><i class="fas fa-tshirt"></i><h4>PREMIUM QUALITY</h4><p>100% cotton</p></div>
                <div class="feature-card"><i class="fas fa-truck"></i><h4>FAST DELIVERY</h4><p>3-5 days</p></div>
                <div class="feature-card"><i class="fas fa-lock"></i><h4>SECURE PAYMENT</h4><p>SSL encrypted</p></div>
                <div class="feature-card"><i class="fas fa-headset"></i><h4>24/7 SUPPORT</h4><p>Live chat</p></div>
            </div>
            <div class="section-header"><h2>TRENDING NOW</h2><span class="view-all" id="viewAllTrending">VIEW ALL →</span></div>
            <div class="filter-bar">
                <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">BEST SELLER</button>
                <button class="filter-btn ${currentFilter === 'new' ? 'active' : ''}" data-filter="new">NEW DROP</button>
                <button class="filter-btn ${currentFilter === 'limited' ? 'active' : ''}" data-filter="limited">LIMITED</button>
            </div>
            <div id="productGrid" class="product-grid"></div>
            <div class="section-header" style="margin-top:2rem;"><h2>COLLECTIONS</h2><span class="view-all" id="viewAllCollections">VIEW ALL →</span></div>
            <div class="anime-grid" id="animeGrid"></div>
        `;
        initFullWidthAdBanner();
        const animeGrid = document.getElementById("animeGrid");
        animeGrid.innerHTML = animeList.map(a => `<div class="anime-card" data-anime="${a.name}"><img src="${a.image}"><h3>${a.name}</h3></div>`).join('');
        document.querySelectorAll('.anime-card').forEach(card => card.addEventListener('click', () => { let an = card.getAttribute('data-anime'); showAnimePage(an); }));
        renderProductsGrid("productGrid");
        attachFilterEvents();
        document.getElementById("viewAllTrending").addEventListener('click', () => renderShop());
        document.getElementById("viewAllCollections").addEventListener('click', () => renderShop());
        attachSearch();
    }
    
    function renderShop() {
        currentPage = "shop"; currentAnime = null;
        const container = document.getElementById("mainContainer");
        container.innerHTML = `<h2 style="margin-bottom:1rem;">ALL PRODUCTS</h2><div class="filter-bar"><button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">BEST SELLER</button><button class="filter-btn ${currentFilter === 'new' ? 'active' : ''}" data-filter="new">NEW DROP</button><button class="filter-btn ${currentFilter === 'limited' ? 'active' : ''}" data-filter="limited">LIMITED</button></div><div id="productGrid" class="product-grid"></div>`;
        renderProductsGrid("productGrid");
        attachFilterEvents();
        attachSearch();
    }
    
    function showAnimePage(animeName) {
        currentPage = "anime"; currentAnime = animeName;
        const container = document.getElementById("mainContainer");
        container.innerHTML = `<button class="back-button" id="backToHomeBtn"><i class="fas fa-arrow-left"></i> Back to Home</button><h2 style="margin-bottom:1rem;">${animeName} Collection</h2><div id="animeProductGrid" class="product-grid"></div>`;
        let filtered = products.filter(p => p.anime === animeName);
        const grid = document.getElementById("animeProductGrid");
        if (filtered.length === 0) grid.innerHTML = "<div style='text-align:center; padding:2rem;'>No products available</div>";
        else {
            grid.innerHTML = filtered.map(p => `<div class="product-card"><img class="product-img" src="${p.image}" data-full="${p.image}"><div class="product-info"><div class="product-title">${p.name}</div><div class="product-price">₱ ${p.price}</div></div><div class="product-actions"><button class="action-icon add-cart" data-id="${p.id}"><i class="fas fa-cart-plus"></i></button><button class="action-icon wishlist-act" data-id="${p.id}"><i class="fas ${isWishlisted(p.id)?'fa-heart':'fa-heart-o'}"></i></button><button class="action-icon fullview" data-img="${p.image}"><i class="fas fa-expand"></i></button></div></div>`).join('');
            document.querySelectorAll('.add-cart').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let id=parseInt(btn.getAttribute('data-id')); let prod=products.find(p=>p.id===id); if(prod) openSizeSelector(prod); }));
            document.querySelectorAll('.wishlist-act').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let id=parseInt(btn.getAttribute('data-id')); toggleWishlist(id); }));
            document.querySelectorAll('.fullview').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); let src=btn.getAttribute('data-img'); openFullscreen(src); }));
            document.querySelectorAll('.product-img').forEach(img=>img.addEventListener('click',()=>openFullscreen(img.getAttribute('data-full'))));
        }
        document.getElementById("backToHomeBtn").addEventListener('click', () => renderHome());
    }
    
    function renderCustomize() {
        currentPage = "customize";
        const container = document.getElementById("mainContainer");
        container.innerHTML = `<div style="text-align:center; padding:2rem;"><h2>Customize Your Tee</h2><p style="margin:1rem 0;">Upload your own design (demo).</p><input type="file" id="customUpload" style="background:#1a1a1a; border:1px solid #ff0000; padding:8px; color:white;"><button id="previewCustomBtn" class="modal-btn" style="margin-top:1rem;">Preview</button></div>`;
        document.getElementById("customUpload")?.addEventListener('change', () => showToast("Demo: design uploaded"));
        document.getElementById("previewCustomBtn")?.addEventListener('click', () => showToast("Customization demo"));
    }
    
    function renderCartPage() {
        currentPage = "cart";
        const container = document.getElementById("mainContainer");
        if (cart.length === 0) { container.innerHTML = `<div style="text-align:center; padding:3rem;">Your cart is empty.<br><button class="back-button" id="continueShopBtn">Continue Shopping</button></div>`; document.getElementById("continueShopBtn")?.addEventListener('click', () => renderShop()); return; }
        let total = cart.reduce((s,i)=>s+(i.price*i.quantity),0);
        let itemsHtml = cart.map((item, idx) => `<div class="cart-item" style="background:#111; margin-bottom:1rem; padding:1rem; border-radius:20px;"><img src="${item.image}" style="width:70px; border-radius:12px;"><div style="flex:1; margin-left:1rem;"><div>${item.name}</div><div>Size: ${item.size} | Qty: ${item.quantity}</div><div>₱ ${(item.price*item.quantity).toFixed(2)}</div></div><button class="cart-remove" data-idx="${idx}"><i class="fas fa-trash"></i></button></div>`).join('');
        container.innerHTML = `<h2>Your Cart</h2>${itemsHtml}<div style="margin-top:2rem; text-align:right;"><strong>Total: ₱ ${total.toFixed(2)}</strong></div><button id="checkoutPageBtn" style="background:#ff0000; border:none; padding:10px 30px; border-radius:40px; font-weight:bold; margin-top:1rem;">Checkout</button><button class="back-button" id="backHomeFromCart">Back to Home</button>`;
        document.querySelectorAll('.cart-remove').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.getAttribute('data-idx')); removeFromCart(idx); renderCartPage(); }));
        document.getElementById("checkoutPageBtn")?.addEventListener('click', () => showCheckoutForm());
        document.getElementById("backHomeFromCart")?.addEventListener('click', () => renderHome());
    }
    
    function attachFilterEvents() {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.getAttribute('data-filter');
                if (currentPage === "home") renderHome();
                else if (currentPage === "shop") renderShop();
                else if (currentPage === "anime" && currentAnime) showAnimePage(currentAnime);
                else renderHome();
            });
        });
    }
    
    function attachSearch() {
        let inp = document.getElementById("searchInput");
        if (inp) inp.oninput = (e) => {
            searchQuery = e.target.value.toLowerCase();
            if (currentPage === "home") renderHome();
            else if (currentPage === "shop") renderShop();
            else if (currentPage === "anime" && currentAnime) showAnimePage(currentAnime);
            else renderHome();
        };
    }
    
    function renderCurrentPage() {
        if (currentPage === "home") renderHome();
        else if (currentPage === "shop") renderShop();
        else if (currentPage === "customize") renderCustomize();
        else if (currentPage === "cart") renderCartPage();
        else if (currentPage === "anime" && currentAnime) showAnimePage(currentAnime);
        else renderHome();
    }
    
    function showSidebarPage(page) {
        let content = "";
        if (page === "categories") {
            content = `<h2>Anime Categories</h2><div class="anime-grid" id="sidebarAnimeGrid"></div><script>const sidebarList = ${JSON.stringify(animeList)}; document.getElementById('sidebarAnimeGrid').innerHTML = sidebarList.map(a => '<div class=\"anime-card\" data-anime=\"'+a.name+'\"><img src=\"'+a.image+'\"><h3>'+a.name+'</h3></div>').join(''); document.querySelectorAll('#sidebarAnimeGrid .anime-card').forEach(card => card.addEventListener('click', () => { let an = card.getAttribute('data-anime'); showAnimePage(an); }));<\/script>`;
        } else if (page === "trackorder") {
            content = `<h2>Track Order</h2><input id="trackId" placeholder="Order ID" style="background:#1a1a1a; border:1px solid red; padding:10px; width:100%;"><button id="trackBtn" class="modal-btn" style="margin-top:10px;">Track</button><p id="trackRes"></p><script>document.getElementById('trackBtn')?.addEventListener('click',()=>document.getElementById('trackRes').innerHTML="Demo: Your order is on the way!");<\/script>`;
        } else if (page === "contact") {
            content = `<h2>Contact Us</h2><input placeholder="Your Email" style="background:#1a1a1a; border:1px solid red; padding:10px; width:100%; margin-bottom:10px;"><textarea placeholder="Message" rows="4" style="background:#1a1a1a; border:1px solid red; padding:10px; width:100%;"></textarea><button class="modal-btn">Send</button><p>Demo contact form</p>`;
        } else if (page === "about") {
            content = `<h2>About Zchoice</h2><p>Premium anime streetwear for true fans. Black, white, red aesthetic. Worldwide shipping.</p>`;
        } else if (page === "faq") {
            content = `<h2>FAQ</h2><p><strong>Shipping time?</strong> 5-7 days.<br><strong>Returns?</strong> 30 days policy.</p>`;
        }
        document.getElementById("mainContainer").innerHTML = `<div style="background:#0a0a0a; border-radius:32px; padding:2rem;">${content}</div>`;
        if (page === "categories") {
            setTimeout(() => {
                document.querySelectorAll('#sidebarAnimeGrid .anime-card').forEach(card => card.addEventListener('click', () => { let an = card.getAttribute('data-anime'); showAnimePage(an); }));
            }, 50);
        }
        if (page === "trackorder") { let btn = document.getElementById("trackBtn"); if (btn) btn.onclick = () => document.getElementById("trackRes").innerHTML = "Demo: Shipped (3-5 days)"; }
    }
    
    document.querySelectorAll('.bottom-nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            let page = btn.getAttribute('data-page');
            if (page === 'home') renderHome();
            else if (page === 'shop') renderShop();
            else if (page === 'customize') renderCustomize();
            else if (page === 'cart') renderCartPage();
            document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    
    document.getElementById("cartIconBtn").addEventListener('click', () => document.getElementById("cartSidebar").classList.toggle("open"));
    document.getElementById("checkoutCartBtn").addEventListener('click', () => showCheckoutForm());
    document.getElementById("wishlistBtn").addEventListener('click', () => { if (wishlistIds.length) showModal("Wishlist", wishlistIds.map(id => products.find(p => p.id === id)?.name).join("<br>"), null); else showToast("Wishlist empty"); });
    let hamburger = document.getElementById("hamburgerSidebar");
    document.getElementById("hamburgerOpenBtn").addEventListener('click', () => hamburger.classList.add("open"));
    document.getElementById("closeHamburger").addEventListener('click', () => hamburger.classList.remove("open"));
    document.querySelectorAll("#hamburgerSidebar li").forEach(li => {
        li.addEventListener('click', () => { let section = li.getAttribute('data-section'); showSidebarPage(section); hamburger.classList.remove("open"); });
    });
    document.addEventListener('click', (e) => { let sidebar = document.getElementById("cartSidebar"); if (!sidebar.contains(e.target) && !document.getElementById("cartIconBtn").contains(e.target)) sidebar.classList.remove("open"); });
    
    loadData();
    renderHome();
</script>
</body>
</html>
